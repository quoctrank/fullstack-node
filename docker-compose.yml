version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: scheduled-task-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      NODE_ENV: production
      DB_PATH: /app/data/tasks.db
      UPLOADS_DIR: /app/uploads
      LOG_LEVEL: info
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-Scheduler App <noreply@example.com>}
      DEFAULT_MAX_RETRIES: ${DEFAULT_MAX_RETRIES:-3}
      DEFAULT_TIMEOUT_MS: ${DEFAULT_TIMEOUT_MS:-30000}
      RETRY_BASE_DELAY_MS: ${RETRY_BASE_DELAY_MS:-1000}
    volumes:
      - db_data:/app/data
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  db_data:
    driver: local
  uploads_data:
    driver: local
